model_list:
  # ── MLX (M1 Metal, $0, приоритет 0) ─────────────────────────
  - model_name: mlx-coder-7b
    litellm_params:
      model: openai/mlx-community/Qwen2.5-Coder-7B-Instruct-4bit
      api_base: http://localhost:8080/v1
      api_key: mlx-local
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: mlx-coder-3b
    litellm_params:
      model: openai/mlx-community/Qwen2.5-Coder-3B-Instruct-4bit
      api_base: http://localhost:8080/v1
      api_key: mlx-local
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: mlx-qwen3-4b
    litellm_params:
      model: openai/mlx-community/Qwen3-4B-4bit
      api_base: http://localhost:8080/v1
      api_key: mlx-local
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: mlx-llama-1b
    litellm_params:
      model: openai/mlx-community/Llama-3.2-1B-Instruct-4bit
      api_base: http://localhost:8080/v1
      api_key: mlx-local
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ── ЛОКАЛЬНЫЕ (Ollama, $0) ───────────────────────────────────
  - model_name: local-lite
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://localhost:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: local-code
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://localhost:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: local-medium
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://localhost:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ── NVIDIA NIM (free tier, 40 RPM) ──────────────────────────
  - model_name: nvidia-kimi
    litellm_params:
      model: openai/moonshotai/kimi-k2.5
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_NIM_API_KEY
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: nvidia-deepseek
    litellm_params:
      model: openai/deepseek-ai/deepseek-r1
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_NIM_API_KEY
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: nvidia-nemotron
    litellm_params:
      model: openai/nvidia/llama-3.1-nemotron-ultra-253b-v1
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_NIM_API_KEY
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ── GEMINI (дёшево) ──────────────────────────────────────────
  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── ANTHROPIC (только deep задачи) ──────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

router_settings:
  routing_strategy: cost-based-routing
  # Иерархия: mlx($0) → local-ollama($0) → nvidia-free($0) → gemini → claude
  fallbacks:
    - mlx-coder-7b:  [mlx-coder-3b, local-code, nvidia-deepseek, gemini-flash]
    - mlx-coder-3b:  [local-lite, nvidia-kimi, gemini-flash-lite]
    - mlx-qwen3-4b:  [mlx-coder-7b, local-code, nvidia-deepseek]
    - mlx-llama-1b:  [mlx-coder-3b, local-lite]
    - local-lite:    [mlx-coder-3b, nvidia-kimi, gemini-flash-lite]
    - local-medium:  [mlx-qwen3-4b, nvidia-nemotron, gemini-flash]
    - local-code:    [mlx-coder-7b, nvidia-deepseek, gemini-flash]
    - claude-sonnet: [gemini-flash]
    - nvidia-kimi:   [gemini-flash-lite]

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: localhost
    port: 6379
    ttl: 86400
  drop_params: true
  telemetry: false
